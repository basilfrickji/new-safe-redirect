<!DOCTYPE html>
<html lang="en">
<head>
     <script src="https://app.trafficshield.io/v2/js_code/4b6f05beab.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kraken Clone UI | Own the Power of Your Money</title>
    <style>
        /* Base Reset & Variables mapped to Kraken's dark theme */
        * {
            margin: 0;
            padding: 0;
            box-shadow: none;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
        }

        :root {
            --bg-main: #0a0d1a;          /* Deep Kraken dark space background */
            --bg-card: #12162b;          /* Component and module surface */
            --brand-purple: #5842f4;     /* Interactive button violet */
            --brand-cyan: #00ebc7;       /* Neon accent cyan highlighting elements */
            --text-primary: #ffffff;
            --text-secondary: #8fa0dd;
            --border-line: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Top Header Navbar Mapping */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 6%;
            background-color: rgba(10, 13, 26, 0.98);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-line);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: var(--text-primary);
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            margin-left: 25px;
            font-size: 15px;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: var(--brand-cyan);
        }

        .header-actions .btn-login {
            color: var(--text-primary);
            text-decoration: none;
            margin-right: 20px;
            font-weight: 600;
            font-size: 15px;
        }

        .btn-cta {
            background-color: var(--brand-purple);
            color: white;
            padding: 12px 26px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: background 0.2s;
        }

        .btn-cta:hover {
            background-color: #432ee0;
        }

        /* Hero Landing Section */
        .hero {
            padding: 180px 6% 120px 6%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1300px;
            margin: 0 auto;
        }

        .hero-content {
            max-width: 620px;
        }

        .hero-content h1 {
            font-size: 58px;
            line-height: 1.15;
            margin-bottom: 24px;
            font-weight: 800;
        }

        .hero-content p {
            font-size: 19px;
            color: var(--text-secondary);
            margin-bottom: 35px;
        }

        .hero-stats {
            display: flex;
            gap: 40px;
            margin-top: 50px;
            border-top: 1px solid var(--border-line);
            padding-top: 25px;
        }

        .stat-item h3 {
            font-size: 28px;
            font-weight: 700;
            color: var(--brand-cyan);
        }

        .stat-item p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 0;
        }

        .hero-image {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }

        .graphic-mockup {
            width: 440px;
            height: 520px;
            background: linear-gradient(145deg, var(--bg-card) 0%, #171c38 100%);
            border-radius: 16px;
            border: 1px solid var(--border-line);
        }

        /* Real-Time Market Ticker Section Layout */
        .market-section {
            padding: 60px 6% 100px 6%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .market-section h2 {
            font-size: 32px;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .market-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-line);
            padding-bottom: 15px;
        }

        .tab {
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
        }

        .tab.active {
            color: var(--text-primary);
            border-bottom: 2px solid var(--brand-purple);
            padding-bottom: 13px;
        }

        .crypto-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .crypto-table th {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            padding: 15px 10px;
            border-bottom: 1px solid var(--border-line);
            text-transform: uppercase;
        }

        .crypto-table td {
            padding: 20px 10px;
            border-bottom: 1px solid var(--border-line);
            font-size: 16px;
        }

        .asset-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }

        .asset-info span {
            color: var(--text-secondary);
            font-weight: 400;
            font-size: 14px;
        }

        .change-negative {
            color: #ff4a5a;
        }

        .change-positive {
            color: var(--brand-cyan);
        }

        /* Services Grid Area Mapping */
        .ecosystem-section {
            padding: 100px 6%;
            background-color: var(--bg-card);
        }

        .section-header {
            text-align: center;
            max-width: 700px;
            margin: 0 auto 60px auto;
        }

        .section-header h2 {
            font-size: 38px;
            margin-bottom: 15px;
        }

        .section-header p {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .ecosystem-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .ecosystem-card {
            background-color: var(--bg-main);
            border: 1px solid var(--border-line);
            padding: 40px;
            border-radius: 12px;
        }

        .ecosystem-card h3 {
            font-size: 22px;
            margin-bottom: 12px;
        }

        .ecosystem-card p {
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: 25px;
        }

        .ecosystem-card .card-link {
            color: var(--brand-cyan);
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
        }

        /* Multi-Column Footer Blueprint */
        footer {
            background-color: var(--bg-main);
            padding: 80px 6% 40px 6%;
            border-top: 1px solid var(--border-line);
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto 60px auto;
        }

        .footer-col h4 {
            color: var(--text-primary);
            font-size: 14px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .footer-col ul {
            list-style: none;
        }

        .footer-col ul li {
            margin-bottom: 12px;
        }

        .footer-col ul li a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .footer-col ul li a:hover {
            color: var(--text-primary);
        }

        .footer-bottom {
            text-align: center;
            border-top: 1px solid var(--border-line);
            padding-top: 30px;
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* Layout Breakdown Adaptability */
        @media (max-width: 968px) {
            header nav { display: none; }
            .hero { flex-direction: column; text-align: center; padding-top: 140px; }
            .hero-content { margin-bottom: 50px; }
            .hero-stats { justify-content: center; }
            .hero-image { justify-content: center; }
            .crypto-table th:nth-child(4), .crypto-table td:nth-child(4) { display: none; }
        }
    </style>
</head>
